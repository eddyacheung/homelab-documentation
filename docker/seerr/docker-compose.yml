services:
  db:
    image: postgres:16
    container_name: Seerr-DB
    hostname: seerr-db
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "seerr", "-U", "seerruser"]
      timeout: 45s
      interval: 10s
      retries: 10
    volumes:
      - /volume1/docker/seerr/db:/var/lib/postgresql/data:rw
    environment:
      POSTGRES_DB: replace-me
      POSTGRES_USER: replace-me
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    networks:
      - media-net

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: Seerr
    user: 1001:10
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 5055:5055
    environment:
      DB_TYPE: postgres
      DB_HOST: seerr-db
      DB_PORT: 5432
      DB_USER: replace-me
      DB_PASS: replace-me
      DB_NAME: replace-me
      DB_LOG_QUERIES: "false"
      TZ: America/Chicago
    volumes:
      - /volume1/docker/seerr/config:/app/config:rw
    restart: unless-stopped
    networks:
      - media-net

networks:
  media-net:
    external: true
