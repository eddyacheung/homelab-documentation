services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    labels:
      - com.centurylinklabs.watchtower.enable=true
    volumes:
      - /volume1/docker/uptime-kuma:/app/data
    ports:
      - 3001:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - media-net

networks:
  media-net:
    external: true
