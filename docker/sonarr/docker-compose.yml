---
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      TZ: America/Chicago
      PGID: 10
      PUID: 1001
    volumes:
      - /volume1/docker/sonarr/config:/config:rw
      - /volume2/Media:/data:rw
    ports:
      - 8989:8989
    restart: unless-stopped
    networks:
      - media-net

networks:
  media-net:
    external: true
